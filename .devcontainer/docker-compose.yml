services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ../..:/workspaces:cached
    command: sleep infinity
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      mock-chain:
        condition: service_started
    networks:
      - devcontainer-network
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: hot_wallet
      MYSQL_USER: hotwalletuser
      MYSQL_PASSWORD: hotpassword
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
    ports:
      - '8318:3306'
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-prootpassword']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - devcontainer-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    networks:
      - devcontainer-network

  mock-chain:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ../..:/workspaces:cached
    working_dir: /workspaces/.devcontainer
    command: node mock-chain-server.js --port=3110
    ports:
      - '3110:3110'
    networks:
      - devcontainer-network

volumes:
  mysql-data:

networks:
  devcontainer-network:
    driver: bridge
